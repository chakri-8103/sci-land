<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Land Project Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #e9e9e9;
        }
        .container {
            background: #0f0f1a;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border: 2px solid #0cc0df;
            margin: auto;
            flex-grow: 1;
        }
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-header h1 {
            color: #0cc0df;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .form-header p {
            color: #8a8a8a;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #0cc0df;
            font-weight: 600;
        }
        .form-group input, 
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #2a2a40;
            background-color: #1a1a2e;
            color: #e9e9e9;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .form-group input:focus, 
        .form-group select:focus {
            outline: none;
            border-color: #0cc0df;
            box-shadow: 0 0 10px rgba(12,192,223,0.3);
        }
        .team-members {
            background-color: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: #0cc0df;
            color: #0f0f1a;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            background-color: #09a1b8;
        }
        .member-section {
            background-color: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .member-section h3 {
            color: #0cc0df;
            margin-bottom: 15px;
            text-align: center;
        }
        footer {
            text-align: center;
            padding: 15px;
            background-color: #1a1a28;
            color: #999;
            margin-top: auto; /* Pushes the footer to the bottom */
        }

        footer p {
            font-size: 0.9rem;
        }
    </style>
    <script>
        function updateMemberFields() {
            const groupSize = parseInt(document.getElementById('groupSize').value);
            const memberFieldsContainer = document.getElementById('memberFields');
            memberFieldsContainer.innerHTML = '';

            for (let i = 0; i < groupSize; i++) {
                const memberSection = document.createElement('div');
                memberSection.classList.add('member-section');
                memberSection.innerHTML = ` 
                    <h3>${i === 0 ? 'Team Leader' : `Team Member ${i}`} Details</h3>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" name="member${i}Name" placeholder="${i === 0 ? 'Team Leader' : `Member ${i}`} Name" required>
                    </div>
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="number" name="member${i}Mobile" placeholder="${i === 0 ? 'Team Leader' : `Member ${i}`} Mobile Number" pattern="^\d{10}$" title="Please enter a valid 10-digit mobile number" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="member${i}Email" placeholder="${i === 0 ? 'Team Leader' : `Member ${i}`} Email" required>
                    </div>
                    <div class="form-group">
                        <label>SUC ID</label>
                        <input type="text" name="member${i}SUC" placeholder="${i === 0 ? 'Team Leader' : `Member ${i}`} SUC ID" required>
                    </div>
                `;
                memberFieldsContainer.appendChild(memberSection);
            }

            // Show the submit button once members are displayed
            const submitButton = document.createElement('button');
            submitButton.type = 'submit';
            submitButton.classList.add('submit-btn');
            submitButton.textContent = 'Submit Project';
            memberFieldsContainer.appendChild(submitButton);
        }

        // Handle form submission
        async function submitForm(event) {
            event.preventDefault();
        
            const confirmSubmit = confirm("Are you sure you want to submit the project?");
            if (!confirmSubmit) {
                return;
            }
        
            const formData = new FormData(event.target);
            const data = {};
            formData.forEach((value, key) => {
                data[key] = value;
            });
        
            console.log("Form data being sent:", data);  // Debugging log
        
            const formDataForGoogleForms = new URLSearchParams();
        
            // Section-1: Project Details
            formDataForGoogleForms.append('entry.841552819', data.projectName);  // Project Name
            formDataForGoogleForms.append('entry.457991118', data.category);  // Project Category
            formDataForGoogleForms.append('entry.1209912714', data.groupSize);  // Group Size
        
            // Section-2: Team Leader Details
            formDataForGoogleForms.append('entry.2140463448', data.member0Name);  // Team Leader Name
            formDataForGoogleForms.append('entry.779914249', data.member0Mobile);  // Team Leader Mobile
            formDataForGoogleForms.append('entry.266553020', data.member0Email);  // Team Leader Email
            formDataForGoogleForms.append('entry.923625385', data.member0SUC);  // Team Leader SUC ID
        
            // Section-3: Team Member 1 Details
            formDataForGoogleForms.append('entry.1212868141', data.member1Name);  // Member 1 Name
            formDataForGoogleForms.append('entry.339824489', data.member1Mobile);  // Member 1 Mobile
            formDataForGoogleForms.append('entry.235007565', data.member1Email);  // Member 1 Email
            formDataForGoogleForms.append('entry.1253860432', data.member1SUC);  // Member 1 SUC ID
        
            // Section-4: Team Member 2 Details
            formDataForGoogleForms.append('entry.1212868141', data.member2Name);  // Member 2 Name
            formDataForGoogleForms.append('entry.339824489', data.member2Mobile);  // Member 2 Mobile
            formDataForGoogleForms.append('entry.235007565', data.member2Email);  // Member 2 Email
            formDataForGoogleForms.append('entry.1253860432', data.member2SUC);  // Member 2 SUC ID
        
            // Section-5: Team Member 3 Details
            formDataForGoogleForms.append('entry.1212868141', data.member3Name);  // Member 3 Name
            formDataForGoogleForms.append('entry.339824489', data.member3Mobile);  // Member 3 Mobile
            formDataForGoogleForms.append('entry.235007565', data.member3Email);  // Member 3 Email
            formDataForGoogleForms.append('entry.1253860432', data.member3SUC);  // Member 3 SUC ID
        
            // Log the final data being sent
            console.log("Final data being sent to Google Forms:", formDataForGoogleForms.toString());
        
            const response = await fetch('https://docs.google.com/forms/d/e/1FAIpQLSfuXyxJb4qp56Ov3OlbwJ3oKO48js7G1CKO9DJ7Q_ueGPVJfg/formResponse', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: formDataForGoogleForms.toString(),
            });
        
            if (response.ok) {
                alert('Project registered successfully!');
            } else {
                alert('Error registering project.');
            }
        }
        
        
    </script>
</head>
<body>
    <div>
        <section class="container">
            <div class="form-header">
                <h1>Sci-Land Project Registration</h1>
                <p>Submit your innovative project for the exhibition</p>
            </div>
            <form onsubmit="submitForm(event)">
                <div class="form-group">
                    <label for="projectName">Project Name</label>
                    <input type="text" id="projectName" name="projectName" required placeholder="Enter your project name">
                </div>

                <div class="form-group">
                    <label for="category">Project Category</label>
                    <select id="category" name="category" required>
                        <option value="">Select Category</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Physics">Physics</option>
                        <option value="Computers">Computers</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Chemistry">E-commerce</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Data Science">Data Science</option>
                        <option value="AI">Artificial Intelligence</option>
                        <option value="Life Science">Life Science</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="groupSize">Group Size</label>
                    <select id="groupSize" name="groupSize" onchange="updateMemberFields()" required>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>

                <div id="memberFields"></div>
            </form>
        </section>
    </div>
    
    <footer>
        <p>&copy; 2025 Sci-Land | All Rights Reserved</p>
    </footer>
</body>
</html>
