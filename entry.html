<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerPoint-Style Animated Photo Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            animation: shakePage 5s infinite alternate ease-in-out;
        }

        .photo {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.5s ease-in-out;
        }

        .photo img {
            width: 350px;
            height: 350px;
            border-radius: 15px;
            object-fit: cover;
        }

        .name-container {
            margin-top: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-align: center;
        }

        /* 🔥 PowerPoint-Style Animations 🔥 */
        @keyframes shakePage {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            50% { transform: translateX(3px); }
            75% { transform: translateX(-3px); }
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(5deg); }
        }

        @keyframes zoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        @keyframes flip {
            0% { transform: rotateY(0); }
            100% { transform: rotateY(180deg); }
        }

        @keyframes fade {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes swing {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
            100% { transform: rotate(-10deg); }
        }

        @keyframes skew {
            0% { transform: skewX(0deg); }
            50% { transform: skewX(10deg); }
            100% { transform: skewX(-10deg); }
        }

    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let names = ["N.SESHA REDDY","Madam"];
            let photos = ["images/photo1.jpeg", "images/photo2.jpeg"];
            let nameContainer = document.getElementById("name-display");
            let photoElement = document.getElementById("photo-img");
            let photoContainer = document.querySelector(".photo");
            let index = 0;

            function changeAnimation() {
                photoContainer.style.animation = ""; // Reset animation
                let animations = ["bounce", "rotate", "zoom", "shake", "flip", "fade", "swing", "skew"];
                let randomAnimation = animations[Math.floor(Math.random() * animations.length)];
                photoContainer.style.animation = `${randomAnimation} 2s infinite alternate ease-in-out`;
            }

            function showNext() {
                nameContainer.textContent = names[index]; // Update name
                photoElement.src = photos[index];        // Update photo
                changeAnimation();                       // Apply a random animation
                index = (index + 1) % names.length;
                setTimeout(showNext, 3000);
            }

            showNext();
        });
    </script>
</head>
<body>
    <div class="photo">
        <img id="photo-img" src="images/photo1.jpeg" alt="Person">
    </div>
    
    <div class="name-container">
        <span id="name-display"></span>
    </div>
</body>
</html>
